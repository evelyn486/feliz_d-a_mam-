<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background-color: #ff85a2; /* Fondo rosa vibrante como tu foto */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .carta {
            background: white;
            width: 85%;
            max-width: 350px;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        h1 {
            color: #d81b60;
            font-family: 'Georgia', serif;
            font-style: italic;
            font-size: 1.5rem;
        }
        img {
            width: 100%;
            border-radius: 10px;
            margin: 15px 0;
        }
        p {
            color: #5d4037;
            line-height: 1.6;
            font-size: 1rem;
        }
        .boton {
            background-color: #f8bbd0;
            color: #880e4f;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="carta">
        <h1>Eres mi inspiración</h1>
        <img src="mifoto.jpg" alt="Foto con mamá">
        <p>Admiro tu fuerza y tu corazón.<br>
           Eres el mejor ejemplo que pude<br>
           tener en la vida.</p>
        <button class="boton">Con amor ❤️</button>
    </div>
</body>
</html>
